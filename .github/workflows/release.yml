name: release
on:
  push: { tags: ["v*"] }
permissions: { contents: write }
jobs:
  plugin:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 22 }
      - run: npm ci
      - run: npm run build
      - run: |
          mkdir -p out/duru
          cp packages/plugin/dist/main.js packages/plugin/package.json out/duru/
          tar czf duru-headlamp-plugin.tar.gz -C out duru
      - run: gh release create "$GITHUB_REF_NAME" duru-headlamp-plugin.tar.gz --generate-notes
        env: { GH_TOKEN: "${{ github.token }}" }
