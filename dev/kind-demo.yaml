apiVersion: v1
kind: Namespace
metadata: { name: demo }
---
apiVersion: apps/v1
kind: Deployment
metadata: { name: web, namespace: demo, labels: { app: web } }
spec:
  replicas: 3
  selector: { matchLabels: { app: web } }
  template:
    metadata: { labels: { app: web } }
    spec: { containers: [ { name: web, image: nginx:alpine, ports: [ { containerPort: 80 } ] } ] }
---
apiVersion: apps/v1
kind: Deployment
metadata: { name: crasher, namespace: demo, labels: { app: crasher } }
spec:
  replicas: 1
  selector: { matchLabels: { app: crasher } }
  template:
    metadata: { labels: { app: crasher } }
    spec: { containers: [ { name: boom, image: busybox, command: ["false"] } ] }   # CrashLoopBackOff
---
apiVersion: v1
kind: Service
metadata: { name: web, namespace: demo }
spec: { selector: { app: web }, ports: [ { port: 80 } ] }
---
apiVersion: v1
kind: ConfigMap
metadata: { name: web-cfg, namespace: demo }
data: { LOG_LEVEL: info }
---
apiVersion: apps/v1
kind: DaemonSet
metadata: { name: agent, namespace: demo, labels: { app: agent } }
spec:
  selector: { matchLabels: { app: agent } }
  template:
    metadata: { labels: { app: agent } }
    spec: { containers: [ { name: agent, image: busybox, command: ["sleep", "infinity"] } ] }
